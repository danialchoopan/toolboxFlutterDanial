name: danialflutter_toolbox
description: "جعبه ابزار دانیال - Persian Utility Toolbox"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  get: ^4.6.6

  # Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  sqflite: ^2.3.0
  path: ^1.9.1
  shared_preferences: ^2.2.0

  # UI Components
  flutter_svg: ^2.0.0
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0
  flutter_staggered_animations: ^1.1.1
  lottie: ^3.1.0
  google_fonts: ^6.1.0

  # Icons
  cupertino_icons: ^1.0.8
  fl_chart: ^0.68.0

  # Utilities
  intl: ^0.20.2
  uuid: ^4.3.0
  path_provider: ^2.1.0
  share_plus: ^10.0.0
  url_launcher: ^6.2.0
  image_picker: ^1.0.0
  permission_handler: ^11.0.0

  # QR Code
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.0.0

  # Sensors / Device
  sensors_plus: ^5.0.0
  flutter_compass: ^0.8.0

  # Crypto
  crypto: ^3.0.3
  encrypt: ^5.0.3

  # Date / Time
  jiffy: ^6.0.0

  # Clipboard
  clipboard: ^0.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.0

flutter:
  uses-material-design: true

  assets:
    - assets/
